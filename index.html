
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body { transition: 0.5s; }
.dark-mode { background-color: #0f172a !important; color: white !important; }
.dark-mode .card { background-color: #1e293b !important; border-color: #334155 !important; }

/* Bildirim Animasyonu */
@keyframes slideIn {
from { transform: translateX(-120%); }
to { transform: translateX(0); }
}
.notification { animation: slideIn 0.5s ease-out; }
</style>

<body class="bg-gray-50 font-sans pb-20">

<div id="bildirimKutusu" class="fixed left-4 bottom-24 z-[110] hidden">
<div class="notification bg-white dark:bg-slate-800 shadow-2xl rounded-2xl p-4 border-l-4 border-blue-600 flex items-center space-x-3">
<div class="bg-blue-100 p-2 rounded-full"><i class="fas fa-check text-blue-600"></i></div>
<div class="text-xs">
<p id="bildirimMetin" class="font-bold text-gray-800 dark:text-white"></p>
<p class="text-gray-400">Az önce onaylandı</p>
</div>
</div>
</div>

<div class="bg-blue-900 text-white text-center py-2 text-[10px] md:text-sm uppercase tracking-tighter">
⚡ 2026 Teknoloji Paketi Aktif: <span class="text-yellow-400">Yapay Zeka Destekli Randevu Sistemi</span>
</div>

<nav class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 p-4">
<div class="max-w-6xl mx-auto flex justify-between items-center">
<div class="flex items-center space-x-2">
<i class="fas fa-car-on text-blue-600 text-2xl"></i>
<span class="font-black text-xl text-blue-900 tracking-tighter uppercase">Mobil Wash</span>
</div>
<button onclick="toggleDarkMode()" class="p-2 bg-gray-100 rounded-lg dark:bg-slate-700">
<i id="darkIcon" class="fas fa-moon"></i>
</button>
</div>
</nav>

<section class="max-w-4xl mx-auto px-4 pt-10 text-center">
<h2 class="font-bold text-gray-500 mb-4 uppercase text-xs">Aracınızın Tipini Seçin, Fiyatı Görün:</h2>
<div class="flex justify-center space-x-4 mb-10">
<button onclick="fiyatGuncelle(1)" class="arac-btn border-2 border-blue-600 bg-blue-600 text-white px-6 py-2 rounded-xl font-bold transition-all">Binek</button>
<button onclick="fiyatGuncelle(1.3)" class="arac-btn border-2 border-blue-600 text-blue-600 px-6 py-2 rounded-xl font-bold transition-all">SUV / Jip</button>
<button onclick="fiyatGuncelle(1.5)" class="arac-btn border-2 border-blue-600 text-blue-600 px-6 py-2 rounded-xl font-bold transition-all">Ticari</button>
</div>
</section>

<section class="max-w-6xl mx-auto px-4 grid md:grid-cols-3 gap-8">
<div class="card bg-white p-8 rounded-[2.5rem] shadow-xl text-center transition-all border-b-8 border-blue-400">
<h3 class="font-bold text-gray-400 uppercase text-xs mb-2">Hızlı Parlatma</h3>
<div class="text-5xl font-black text-blue-900 mb-6" id="f1">₺650</div>
<button class="w-full py-3 rounded-2xl bg-blue-50 text-blue-600 font-bold hover:bg-blue-600 hover:text-white transition">Randevu</button>
</div>

<div class="card bg-white p-8 rounded-[2.5rem] shadow-2xl text-center transition-all border-b-8 border-blue-600 scale-105 relative">
<div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-4 py-1 rounded-full text-[10px] font-bold">LİDER PAKET</div>
<h3 class="font-bold text-gray-400 uppercase text-xs mb-2">İç + Dış Detay</h3>
<div class="text-5xl font-black text-blue-900 mb-6" id="f2">₺1.100</div>
<button class="w-full py-4 rounded-2xl bg-blue-600 text-white font-black shadow-xl">HEMEN AL</button>
</div>

<div class="card bg-white p-8 rounded-[2.5rem] shadow-xl text-center transition-all border-b-8 border-indigo-600">
<h3 class="font-bold text-gray-400 uppercase text-xs mb-2">VIP Showroom</h3>
<div class="text-5xl font-black text-blue-900 mb-6" id="f3">₺2.400</div>
<button class="w-full py-3 rounded-2xl bg-indigo-50 text-indigo-600 font-bold hover:bg-indigo-600 hover:text-white transition">Hizmet Seç</button>
</div>
</section>

<a href="#" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl z-[100] hover:scale-110 transition">
<i class="fab fa-whatsapp text-3xl"></i>
</a>

<script>
// Fiyatları Güncelleme (Çarpan ile)
const anaFiyatlar = [650, 1100, 2400];
function fiyatGuncelle(carpan) {
document.getElementById('f1').innerText = "₺" + Math.round(anaFiyatlar[0] * carpan);
document.getElementById('f2').innerText = "₺" + Math.round(anaFiyatlar[1] * carpan);
document.getElementById('f3').innerText = "₺" + Math.round(anaFiyatlar[2] * carpan);

// Buton renklerini güncelle
const btns = document.querySelectorAll('.arac-btn');
btns.forEach(b => {
b.classList.remove('bg-blue-600', 'text-white');
b.classList.add('text-blue-600');
});
event.target.classList.add('bg-blue-600', 'text-white');
}

// Canlı Bildirim Simülasyonu
const yerler = ["Beşiktaş", "Kadıköy", "Etiler", "Üsküdar", "Florya"];
const araclar = ["Mercedes", "BMW", "Audi", "Tesla", "VW"];

function bildirimGoster() {
const kutu = document.getElementById('bildirimKutusu');
const metin = document.getElementById('bildirimMetin');
const rYer = yerler[Math.floor(Math.random()*yerler.length)];
const rArac = araclar[Math.floor(Math.random()*araclar.length)];

metin.innerText = rYer + " bölgesinde bir " + rArac + " yıkandı!";
kutu.classList.remove('hidden');

setTimeout(() => { kutu.classList.add('hidden'); }, 4000);
}
setInterval(bildirimGoster, 12000); // 12 saniyede bir bildirim

function toggleDarkMode() {
document.body.classList.toggle('dark-mode');
}
</script>
</body>
