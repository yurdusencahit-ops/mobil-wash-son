<style>
/* 1. DERİNLİK EFEKTİ (Ken Burns) */
@keyframes zoomEffect {
0% { transform: scale(1); }
100% { transform: scale(1.15); } /* Hafifçe yakınlaşarak derinlik katar */
}

/* Slider alanını ve resimleri hareketlendiriyoruz */
#slider {
position: relative;
overflow: hidden; /* Taşmaları engeller */
}

/* Görsellerin akıcı geçişi ve sürekli hareketi */
.slider-bg {
position: absolute;
inset: 0;
background-size: cover;
background-position: center;
transition: opacity 1.5s ease-in-out; /* Resimler arası yumuşak geçiş */
animation: zoomEffect 8s infinite alternate ease-in-out; /* Sürekli derinlik hareketi */
opacity: 0;
}

.slider-bg.active {
opacity: 1;
}
</style>

<div id="slider" class="h-[400px] flex items-center justify-center relative">
<div id="bg-1" class="slider-bg active" style="background-image: url('https://images.unsplash.com/photo-1520340356584-f9917d1eea6f?w=1200');"></div>
<div id="bg-2" class="slider-bg" style="background-image: url('https://images.unsplash.com/photo-1607860108855-64acf2078ed9?w=1200');"></div>

<div class="absolute inset-0 bg-black/40 z-10"></div>

<div class="relative z-20 text-center text-white p-6">
<h1 class="text-4xl md:text-6xl font-black mb-4 italic uppercase">Arabanız Parlasın</h1>
<button class="bg-green-500 hover:bg-green-600 px-8 py-3 rounded-full font-black shadow-xl transition-all hover:scale-105 uppercase tracking-widest">Randevu Al</button>
</div>
</div>

<script>
// GÖRSEL HAREKET SİSTEMİ (JS)
let currentBg = 1;
setInterval(() => {
document.getElementById(`bg-${currentBg}`).classList.remove('active');
currentBg = currentBg === 1 ? 2 : 1;
document.getElementById(`bg-${currentBg}`).classList.add('active');
}, 5000); // 5 saniyede bir resim değişir, derinlik efekti sürekli çalışır
</script>
